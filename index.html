<!DOCTYPE html>
<html>
<head>
<title>Valentine Proposal ❤️</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:'Comic Sans MS', cursive;
    background:linear-gradient(135deg,#ff9a9e,#fecfef);
    text-align:center;
}

h1{
    margin-top:80px;
    font-size:42px;
    color:white;
}

.gallery{
    margin-top:20px;
}

.gallery img{
    width:160px;
    border-radius:20px;
    margin:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

#buttons{
    margin-top:40px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff3b6f;
    color:white;
}

#no{
    background:#555;
    color:white;
    position:absolute;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<h1 id="question">Will you be my Valentine? 💖</h1>

<div class="gallery">

<!-- <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"> -->
<!-- <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif"> -->
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

</div>

<div id="buttons">
<button id="yes">Yes 😍</button>
<button id="no">No 🙃</button>
</div>

<script>

let yesSize = 1
let noSize = 1

const messages = [
"Are you sure? 🥺",
"Think again 😭",
"I'll bring chocolates 🍫",
"I'll bring pizza 🍕",
"Please say yes 😭",
"Last chance 😭"
]

let messageIndex = 0

document.getElementById("yes").onclick = function(){

document.body.innerHTML =
"<h1 style='margin-top:150px;font-size:60px;color:white;'>YAYYYY ❤️</h1>" +
"<img src='https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif' width='250'>" +
"<h2 style='color:white;'>Best Valentine Ever 😍<br>Mwah Mwahh Mwahhh Mwahhhhhhh 🥰🥰🥰🥰🥰</h2>" +
"<div style='font-size:60px'>🎉🎉🎉🎉🎉</div>"

for(let i=0;i<200;i++){
createHeart()
}

}

document.getElementById("no").onclick = function(){

if(messageIndex < messages.length){
document.getElementById("question").innerText = messages[messageIndex]
messageIndex++
}

yesSize += 0.3
noSize -= 0.1

document.getElementById("yes").style.transform = "scale("+yesSize+")"
document.getElementById("no").style.transform = "scale("+noSize+")"

moveNo()

}

function moveNo(){

let x = Math.random() * (window.innerWidth - 100)
let y = Math.random() * (window.innerHeight - 100)

let btn = document.getElementById("no")

btn.style.left = x + "px"
btn.style.top = y + "px"

}

function createHeart(){

let heart = document.createElement("div")

heart.className="heart"
heart.innerHTML="💖"

heart.style.left = Math.random()*100+"vw"
heart.style.fontSize = (10 + Math.random()*30)+"px"
heart.style.animationDuration = (3 + Math.random()*3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
