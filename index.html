<!DOCTYPE html>
<html>
<head>
<title>Valentine Proposal ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
text-align:center;
}

h1{
margin-top:80px;
font-size:45px;
color:white;
text-shadow:2px 2px 10px #ff4d6d;
}

.gallery img{
width:170px;
border-radius:20px;
margin:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#buttons{
margin-top:40px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff3b6f;
color:white;
}

#yes:hover{
transform:scale(1.2);
}

#no{
background:#555;
color:white;
position:absolute;
}

.heart,.kiss{
position:absolute;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1 id="question">Will you be my Valentine? 💖</h1>

<div class="gallery">

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

</div>

<div id="buttons">
<button id="yes">Yes 😍</button>
<button id="no">No 🙃</button>
</div>

<script>

let yesSize=1
let noSize=1

const messages=[
"Are you sure? 🥺",
"Think again 😭",
"I'll bring chocolates 🍫",
"I'll bring pizza 🍕",
"Please say yes 😭",
"Don't break my heart 💔",
"Last chance 😭"
]

let messageIndex=0

document.getElementById("yes").onclick=function(){

document.body.innerHTML=

"<h1 style='margin-top:120px;font-size:65px;color:white;'>YAYYYY ❤️</h1>"+
"<img src='https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif' width='250'>"+
"<h2 style='color:white;'>Best Valentine Ever 😍<br>Mwah Mwahhh Mwahhhh 💋💋💋</h2>"+
"<div style='font-size:70px'>🎉💖🎉💖🎉💖</div>"

for(let i=0;i<300;i++){
createHeart()
createKiss()
}

}

document.getElementById("no").onclick=function(){

if(messageIndex<messages.length){
document.getElementById("question").innerText=messages[messageIndex]
messageIndex++
}

yesSize+=0.4
noSize-=0.15

document.getElementById("yes").style.transform="scale("+yesSize+")"
document.getElementById("no").style.transform="scale("+noSize+")"

moveNo()

}

function moveNo(){

let x=Math.random()*(window.innerWidth-100)
let y=Math.random()*(window.innerHeight-100)

let btn=document.getElementById("no")

btn.style.left=x+"px"
btn.style.top=y+"px"

}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*30)+"px"
heart.style.animationDuration=(3+Math.random()*4)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

function createKiss(){

let kiss=document.createElement("div")

kiss.className="kiss"
kiss.innerHTML="💋"

kiss.style.left=Math.random()*100+"vw"
kiss.style.fontSize=(15+Math.random()*30)+"px"
kiss.style.animationDuration=(3+Math.random()*4)+"s"

document.body.appendChild(kiss)

setTimeout(()=>{
kiss.remove()
},6000)

}

setInterval(createHeart,200)
setInterval(createKiss,500)

</script>

</body>
</html>
